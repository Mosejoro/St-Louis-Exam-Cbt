<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Online Examination System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="examv1.css" />
  </head>
  <body>
    <div class="powered-by-bina-floating">
      <span>Powered by</span>
      <img src="Bina Pry.png" alt="BINA Logo" />
    </div>
    <div class="container">
      <div class="header">
        <img src="Bida2.png" /><br />
        <h1>St Louis Bida Exam Portal</h1>
      </div>

      <div class="selection-form ">
        <div class="form-group dd">
          <label for="day">Select Day:</label>
          <select id="day" class="form-control" disabled>
            <option value="Day1">Monday</option>
            <option value="Day2">Tuesday</option>
            <option value="Day3">Wednesday</option>
            <option value="Day4">Thursday</option>
            <option value="Day5">Friday</option>
          </select>
        </div>

        <div class="form-group">
          <label for="class">Select Class:</label>
          <select id="class" class="form-control">
            <option value="P1">Primary 1</option>
            <option value="P2">Primary 2</option>
            <option value="P3">Primary 3</option>
            <option value="P4">Primary 4</option>
            <option value="P5">Primary 5</option>
            <option value="P6">Primary 6</option>
          </select>
        </div>

        <div class="form-group">
          <label for="subject">Select Subject:</label>
          <select id="subject" class="form-control"></select>
        </div>

        <button onclick="startExam()" class="btn btn-primary btn-block">
          Start Exam
        </button>
      </div>
    </div>

    <script>
      const timetable = {
        Day1: {
          P1: ["Mathematics", "PHE"],
          P2: ["Mathematics", "PHE"],
          P3: ["Mathematics", "PHE"],
          P4: ["Mathematics", "PHE"],
          P5: ["Mathematics", "PHE"],
          P6: ["Mathematics", "PHE"],
        },
        Day2: {
          P1: ["Basic_Science", "CRK"],
          P2: ["Basic_Science", "CRK"],
          P3: ["Basic_Science", "CRK", "MORAL"],
          P4: ["Basic_Science", "CRK"],
          P5: ["Basic_Science", "CRK"],
          P6: ["Basic_Science", "CRK"],
        },
        Day3: {
          P1: ["English", "CCA"],
          P2: ["Mathematics", "PHE"],
          P3: ["English", "CCA"],
          P4: ["English", "CCA"],
          P5: ["English", "CCA"],
          P6: ["English", "CCA"],
        },
        Day4: {
          P1: ["Social_Studies", "History"],
          P2: ["Social_Studies", "History"],
          P3: ["Social_Studies", "History"],
          P4: ["Social_Studies", "History", "French"],
          P5: ["Social_Studies", "History", "French"],
          P6: ["Social_Studies", "History", "French"],
        },
        Day5: {
           P3: ["CCA"],
          P4: ["Prevocational_Studies", "Digital"],
          P5: ["Prevocational_Studies", "Digital"],
          P6: ["Prevocational_Studies", "Digital"],
        },
      };

      /**
       * Fetches the current time from WorldTimeAPI (online source).
       * Falls back to local time if the request fails.
       * Returns an object: { hours, minutes, dayOfWeek }
       * dayOfWeek: 0 = Sunday, 1 = Monday ... 6 = Saturday
       */
      async function getOnlineTime() {
        try {
          // Using Africa/Lagos timezone (WAT, UTC+1) — adjust if needed
          const response = await fetch(
            "https://worldtimeapi.org/api/timezone/Africa/Lagos"
          );
          if (!response.ok) throw new Error("Time API response not OK");
          const data = await response.json();

          // datetime format: "2024-11-06T14:35:22.123456+01:00"
          const datetime = new Date(data.datetime);
          return {
            hours: datetime.getHours(),
            minutes: datetime.getMinutes(),
            dayOfWeek: datetime.getDay(),
          };
        } catch (err) {
          console.warn("Could not fetch online time, falling back to local time:", err);
          const now = new Date();
          return {
            hours: now.getHours(),
            minutes: now.getMinutes(),
            dayOfWeek: now.getDay(),
          };
        }
      }

      /**
       * Checks whether the current time is within the allowed exam window.
       * Allowed window: 07:30 AM to 04:00 PM (16:00)
       * Outside this window → redirect to Not.html
       */
      function isWithinExamWindow(hours, minutes) {
        const totalMinutes = hours * 60 + minutes;
        const windowStart = 7 * 60 + 30;   // 07:30 → 450 minutes
        const windowEnd   = 16 * 60;        // 16:00 → 960 minutes
        return totalMinutes >= windowStart && totalMinutes < windowEnd;
      }

      /**
       * Maps day-of-week number to the exam day key.
       * Weekends fall back to Friday (Day5).
       */
      function getExamDay(dayOfWeek) {
        const dayMap = {
          0: "Day5", // Sunday  → Friday
          1: "Day1", // Monday
          2: "Day2", // Tuesday
          3: "Day3", // Wednesday
          4: "Day4", // Thursday
          5: "Day5", // Friday
          6: "Day5", // Saturday → Friday
        };
        return dayMap[dayOfWeek];
      }

      async function initPage() {
        const { hours, minutes, dayOfWeek } = await getOnlineTime();

        // ── Redirect check ──────────────────────────────────────────────
        if (!isWithinExamWindow(hours, minutes)) {
          window.location.href = "Not.html";
          return; // stop further execution
        }

        // ── Set the current exam day and populate subjects ───────────────
        const currentExamDay = getExamDay(dayOfWeek);
        document.getElementById("day").value = currentExamDay;
        updateSubjects();
      }

      document.getElementById("day").addEventListener("change", updateSubjects);
      document.getElementById("class").addEventListener("change", updateSubjects);

      function updateSubjects() {
        const day = document.getElementById("day").value;
        const cls = document.getElementById("class").value;
        const subjectsDropdown = document.getElementById("subject");

        subjectsDropdown.innerHTML = "";

        if (timetable[day] && timetable[day][cls]) {
          timetable[day][cls].forEach((subject) => {
            const option = document.createElement("option");
            option.value = subject;
            option.textContent = subject.replace(/_/g, " ");
            subjectsDropdown.appendChild(option);
          });
        }
      }

      function startExam() {
        const day = document.getElementById("day").value;
        const cls = document.getElementById("class").value;
        const subject = document.getElementById("subject").value;

        if (!subject) {
          alert("Please select a subject.");
          return;
        }

        localStorage.setItem("examDay", day);
        localStorage.setItem("examClass", cls);
        localStorage.setItem("examSubject", subject);

        window.location.href = "questions.html";
      }

      // Kick everything off
      document.addEventListener("DOMContentLoaded", initPage);
    </script>
  </body>
</html>
